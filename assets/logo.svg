<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#050810"/><stop offset="100%" stop-color="#0A1020"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#FBBF24"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="520" height="160" rx="14" fill="url(#bg)"/>
  <rect width="520" height="160" rx="14" fill="none" stroke="#F97316" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Elasticsearch / search icon -->
  <g transform="translate(22,22)" filter="url(#glow)">
    <circle cx="56" cy="52" r="36" fill="none" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="56" cy="52" r="24" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.45"/>
    <circle cx="56" cy="52" r="13" fill="#050810" stroke="url(#g1)" stroke-width="2"/>
    <text x="56" y="58" text-anchor="middle" fill="url(#g1)" font-size="12" font-weight="800" filter="url(#glow)">E</text>
    <!-- Search handle -->
    <line x1="73" y1="70" x2="88" y2="88" stroke="#F97316" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Ripple effects -->
    <circle cx="56" cy="52" r="42" fill="none" stroke="#F97316" stroke-width="0.8" stroke-opacity="0.15"/>
    <!-- AI label -->
    <rect x="75" y="14" width="28" height="18" rx="4" fill="#050810" stroke="#FBBF24" stroke-width="1"/>
    <text x="89" y="27" text-anchor="middle" fill="#FBBF24" font-size="9" font-weight="800">AI</text>
  </g>
  <text x="156" y="56" fill="url(#g1)" font-size="26" font-weight="800" letter-spacing="-0.5" filter="url(#glow)">NEXUS·ELASTIC</text>
  <text x="157" y="79" fill="#3A2A1A" font-size="12.5" letter-spacing="0.5">Financial Intelligence Agent — Elasticsearch · Gemini · Hackathon</text>
  <rect x="156" y="89" width="340" height="1.5" rx="1" fill="url(#g1)" opacity="0.3"/>
  <g transform="translate(156,103)">
    <rect x="0"   y="0" width="62" height="22" rx="5" fill="#F97316" fill-opacity="0.1" stroke="#F97316" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="31"  y="15" text-anchor="middle" fill="#F97316" font-size="10">Python</text>
    <rect x="68"  y="0" width="100" height="22" rx="5" fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="118" y="15" text-anchor="middle" fill="#FBBF24" font-size="10">Elasticsearch</text>
    <rect x="174" y="0" width="72" height="22" rx="5" fill="#F97316" fill-opacity="0.1" stroke="#F97316" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="210" y="15" text-anchor="middle" fill="#F97316" font-size="10">Gemini</text>
  </g>
  <text x="156" y="149" fill="#3A2A1A" font-size="10">Turbo31150  ·  MIT  ·  Agent Builder Hackathon 2026  ·  Financial AI</text>
